<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connection Test</title>
<style>
  body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
  button { padding: 16px 24px; font-size: 16px; cursor: pointer; }
  pre { background: #eee; padding: 16px; white-space: pre-wrap; word-break: break-word; }
  #status { margin-top: 20px; }
</style>
</head>
<body>

<h1>Stripe + Vercel + Seam test</h1>
<p>This creates a real $35 test charge (Stripe test mode — no real money) for a session starting 5 minutes from now, lasting 1 hour. If everything is wired up correctly, it'll redirect you to Stripe, then to your success page with a working door code.</p>

<button id="run-btn">Run test booking</button>

<div id="status"></div>

<script>
  const BACKEND_URL = 'https://driftsimpro-com.vercel.app';

  document.getElementById('run-btn').addEventListener('click', async () => {
    const statusEl = document.getElementById('status');
    statusEl.textContent = 'Calling create-checkout-session...';

    const now = new Date();
    now.setMinutes(now.getMinutes() + 5);
    const date = now.toISOString().slice(0, 10);
    const time = now.toTimeString().slice(0, 5);

    try {
      const res = await fetch(`${BACKEND_URL}/api/create-checkout-session`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date, time, duration: '1',
          name: 'Test User', email: 'test@example.com',
        }),
      });

      const data = await res.json();
      statusEl.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';

      if (data.url) {
        statusEl.innerHTML += '<p>Redirecting to Stripe in 2 seconds...</p>';
        setTimeout(() => { window.location.href = data.url; }, 2000);
      }
    } catch (err) {
      statusEl.innerHTML = '<pre>Fetch failed: ' + err.message + '</pre>';
    }
  });
</script>

</body>
</html>
