<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sim Drift | Coming Soon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    width: 100vw;
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  .smoke {
    position: absolute;
    bottom: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 140%;
    height: 60%;
    background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.06) 0%, transparent 70%);
    filter: blur(40px);
    animation: drift-smoke 8s ease-in-out infinite alternate;
  }

  @keyframes drift-smoke {
    0% { transform: translateX(-55%) scale(1); opacity: 0.5; }
    100% { transform: translateX(-45%) scale(1.15); opacity: 0.8; }
  }

  .tire-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: repeating-linear-gradient(
      100deg,
      transparent 0px,
      transparent 60px,
      rgba(255, 60, 0, 0.03) 62px,
      transparent 64px
    );
    animation: skid 6s linear infinite;
  }

  @keyframes skid {
    0% { background-position: 0 0; }
    100% { background-position: 400px 0; }
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 5.5rem);
    font-weight: 800;
    letter-spacing: 6px;
    color: #fff;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255, 80, 0, 0.6), 0 0 60px rgba(255, 80, 0, 0.3);
    animation: flicker 3s ease-in-out infinite;
  }

  h1 span {
    background: linear-gradient(90deg, #ff5500, #ff8800, #ffb300);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  @keyframes flicker {
    0%, 100% { text-shadow: 0 0 20px rgba(255, 80, 0, 0.6), 0 0 60px rgba(255, 80, 0, 0.3); }
    50% { text-shadow: 0 0 30px rgba(255, 120, 0, 0.9), 0 0 90px rgba(255, 120, 0, 0.4); }
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    letter-spacing: 4px;
    color: #999;
    text-transform: uppercase;
  }

  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ff5500, transparent);
    margin: 28px auto;
  }

  .coming-soon {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: #fff;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    opacity: 0.9;
  }
</style>
</head>
<body>

  <div class="tire-lines"></div>
  <div class="smoke"></div>

  <div class="content">
    <h1>SIM <span>DRIFT</span></h1>
    <div class="subtitle">Precision. Angle. Style.</div>
    <div class="divider"></div>
    <div class="coming-soon">Coming Soon</div>
  </div>

</body>
</html>
